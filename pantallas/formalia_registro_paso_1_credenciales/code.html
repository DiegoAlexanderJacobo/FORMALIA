<body class="bg-background min-h-screen flex flex-col">
<!-- TopAppBar Section (Shared Component) -->
<header class="w-full top-0 sticky z-50 bg-surface dark:bg-surface-dim shadow-sm dark:shadow-none">
<div class="flex justify-between items-center px-container-margin py-md w-full max-w-7xl mx-auto">
<div class="font-headline-md text-headline-md font-bold bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent">
                FORMALIA
            </div>
<div class="flex items-center gap-xs">
<button class="material-symbols-outlined text-primary dark:text-primary-fixed-dim hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-200">
                    help_outline
                </button>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-start px-container-margin py-xl max-w-lg mx-auto w-full">
<!-- Stepper Component -->
<div class="w-full mb-xl">
<div class="flex justify-between items-center mb-xs"><span class="font-label-md text-label-md text-primary font-bold uppercase tracking-wider">Paso 1 de 4</span><span class="font-label-sm text-label-sm text-on-surface-variant">Credenciales</span></div>
<div class="h-3 w-full bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-secondary rounded-full transition-all duration-700 ease-out" style="width: 25%;"></div>
</div>
</div>
<!-- Header Content -->
<div class="w-full text-left mb-xl">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface mb-xs">
                Crea tu cuenta
            </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">
                Comencemos con tus credenciales de acceso para proteger tu negocio.
            </p>
</div>
<!-- Form Section -->
<form class="w-full space-y-lg">
<!-- Email Field -->
<div class="space-y-xs group">
<label class="font-label-md text-label-md text-on-surface block ml-base" for="email">
                    Correo electrónico
                </label>
<div class="relative flex items-center bg-white border border-outline-variant rounded-xl h-14 px-md form-input-focus transition-all">
<span class="material-symbols-outlined text-outline mr-sm">mail</span>
<input class="w-full bg-transparent border-none focus:ring-0 font-body-md text-body-md text-on-surface placeholder:text-outline/50" id="email" placeholder="nombre@empresa.com" required="" type="email">
<span class="material-symbols-outlined text-secondary hidden" id="email-validation">check_circle</span>
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs group">
<label class="font-label-md text-label-md text-on-surface block ml-base" for="password">
                    Contraseña
                </label>
<div class="relative flex items-center bg-white border border-outline-variant rounded-xl h-14 px-md form-input-focus transition-all">
<span class="material-symbols-outlined text-outline mr-sm">lock</span>
<input class="w-full bg-transparent border-none focus:ring-0 font-body-md text-body-md text-on-surface placeholder:text-outline/50" id="password" placeholder="••••••••" required="" type="password">
<button class="material-symbols-outlined text-outline hover:text-primary transition-colors focus:outline-none" id="toggle-password" type="button">
                        visibility
                    </button>
</div>
<div class="flex flex-wrap gap-xs mt-base ml-base">
<div class="flex items-center gap-1">
<div class="w-1.5 h-1.5 rounded-full bg-outline-variant" id="req-len"></div>
<span class="font-label-sm text-label-sm text-outline">8+ caracteres</span>
</div>
<div class="flex items-center gap-1">
<div class="w-1.5 h-1.5 rounded-full bg-outline-variant" id="req-num"></div>
<span class="font-label-sm text-label-sm text-outline">Número</span>
</div>
</div>
</div><div class="space-y-xs group">
<label class="font-label-md text-label-md text-on-surface block ml-base" for="confirm-password">
                    Confirmar contraseña
                </label>
<div class="relative flex items-center bg-white border border-outline-variant rounded-xl h-14 px-md form-input-focus transition-all">
<span class="material-symbols-outlined text-outline mr-sm">lock</span>
<input class="w-full bg-transparent border-none focus:ring-0 font-body-md text-body-md text-on-surface placeholder:text-outline/50" id="confirm-password" placeholder="••••••••" required="" type="password">
<button class="material-symbols-outlined text-outline hover:text-primary transition-colors focus:outline-none" id="toggle-confirm-password" type="button">
                        visibility
                    </button>
</div>
</div>
<!-- Action Button -->
<div class="pt-md">
<button class="w-full h-14 brand-gradient text-white font-label-md text-label-md rounded-xl shadow-lg hover:opacity-90 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-xs" type="submit">
                    Siguiente
                    <span class="material-symbols-outlined">arrow_forward</span>
</button>
<p class="mt-lg text-center font-label-sm text-label-sm text-on-surface-variant px-md">
                    Al continuar, aceptas nuestros <a class="text-primary font-bold underline decoration-primary/30" href="#">Términos de Servicio</a> y <a class="text-primary font-bold underline decoration-primary/30" href="#">Política de Privacidad</a>.
                </p>
</div>
</form>
<!-- Illustration / Mood Area -->
<div class="mt-xl w-full">
<div class="relative rounded-3xl overflow-hidden shadow-sm aspect-[16/9] w-full">
<div class="w-full h-full bg-cover bg-center" data-alt="A clean and modern corporate workspace with a minimalist desk, a sleek laptop showing a financial dashboard, and a small green plant. The lighting is bright and natural, coming from a large window. The color palette is professional with soft blues, whites, and deep corporate greens, creating an atmosphere of reliability, momentum, and business formalization." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBVv9fZVks9aFdNF4mUYEoQAhxkX-lcwYZdH7SY2QryCjpmn6JPyv22SiLMzz2hPjUJqvBza-_jqh9GEvg_sUpv-jHhPBVs6d8uTUrtOqXwYfgYnco523CAbWSW3jDZem1w8-oA02lh3bi5WU6QPR3ImWOMZkxs7-UQxp5K1vCATIw4ioVVTDKoFeaUqLgKabPHZcmaN6TQJebKUOvrUbekw7nPY8van3Equnl3cmmRR43f2ReoS0auUH1ZZdVf0BZBQg5rRNDazyMT')"></div>
<div class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent"></div>
</div>
</div>
</main>
<!-- Floating Atmosphere Elements (JS micro-interactions) -->
<div class="fixed -z-10 w-64 h-64 rounded-full blur-[100px] opacity-20 pointer-events-none transition-all duration-1000 ease-in-out" id="glow-element" style="background-color: rgb(108, 248, 187); top: 10%; right: -5%; transform: translate(4.1px, 5.64px);"></div>
<div class="fixed -z-10 w-96 h-96 rounded-full blur-[120px] opacity-10 pointer-events-none transition-all duration-1000 ease-in-out" id="glow-element-2" style="background-color: rgb(0, 35, 111); bottom: -10%; left: -5%; transform: translate(-4.1px, -5.64px);"></div>
<script>
        // Password Visibility Toggle
        const passwordInput = document.getElementById('password');
        const toggleBtn = document.getElementById('toggle-password');
        
        toggleBtn.addEventListener('click', () => {
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            toggleBtn.innerText = isPassword ? 'visibility_off' : 'visibility';
        });

        // Simple Validation UI Logic
        const emailInput = document.getElementById('email');
        const emailCheck = document.getElementById('email-validation');
        
        emailInput.addEventListener('input', (e) => {
            if (e.target.value.includes('@') && e.target.value.includes('.')) {
                emailCheck.classList.remove('hidden');
            } else {
                emailCheck.classList.add('hidden');
            }
        });

        // Atmospheric Micro-interaction
        document.addEventListener('mousemove', (e) => {
            const glow1 = document.getElementById('glow-element');
            const glow2 = document.getElementById('glow-element-2');
            
            const moveX = (e.clientX - window.innerWidth / 2) / 50;
            const moveY = (e.clientY - window.innerHeight / 2) / 50;
            
            glow1.style.transform = `translate(${moveX}px, ${moveY}px)`;
            glow2.style.transform = `translate(${-moveX}px, ${-moveY}px)`;
        });

        // Password strength simple feedback
        passwordInput.addEventListener('input', (e) => {
            const val = e.target.value;
            const reqLen = document.getElementById('req-len');
            const reqNum = document.getElementById('req-num');
            
            if (val.length >= 8) {
                reqLen.classList.replace('bg-outline-variant', 'bg-secondary');
            } else {
                reqLen.classList.replace('bg-secondary', 'bg-outline-variant');
            }
            
            if (/\d/.test(val)) {
                reqNum.classList.replace('bg-outline-variant', 'bg-secondary');
            } else {
                reqNum.classList.replace('bg-secondary', 'bg-outline-variant');
            }
        });
    </script>




</body></html>
