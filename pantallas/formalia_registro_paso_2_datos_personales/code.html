      /* Step Indicator line */
      .step-line {
        position: relative;
      }
      .step-line::after {
        content: '';
        position: absolute;
        top: 50%;
        left: 0;
        right: 0;
        height: 2px;
        background: #E5E7EB;
        z-index: 1;

<script>
        // Micro-interaction for DNI validation check
        const dniInput = document.getElementById('dni');
        const dniValidIcon = document.getElementById('dni-valid');

        dniInput.addEventListener('input', (e) => {
            const value = e.target.value;
            if (value.length === 11) {
                dniValidIcon.classList.remove('hidden');
                dniValidIcon.classList.add('animate-bounce');
                setTimeout(() => dniValidIcon.classList.remove('animate-bounce'), 1000);
            } else {
                dniValidIcon.classList.add('hidden');
            }
        });

        // Click effects for primary button
        document.querySelector('.btn-primary-gradient').addEventListener('click', function(e) {
            let x = e.clientX - e.target.offsetLeft;
            let y = e.clientY - e.target.offsetTop;
            
            let ripples = document.createElement('span');
            ripples.style.left = x + 'px';
            ripples.style.top = y + 'px';
            ripples.classList.add('ripple');
            this.appendChild(ripples);

            setTimeout(() => {
                ripples.remove();
            }, 1000);
        });
    </script>
