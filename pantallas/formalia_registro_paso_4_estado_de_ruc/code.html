<body class="bg-surface text-on-surface min-h-screen flex flex-col font-body-md">
<!-- TopAppBar - Suppressed Shell based on Transactional Intent, 
         but keeping a simplified version for brand anchoring -->
<header class="w-full top-0 sticky bg-surface dark:bg-surface-dim shadow-sm z-40">
<div class="flex justify-between items-center px-container-margin py-md w-full max-w-7xl mx-auto">
<span class="font-headline-md text-headline-md font-bold bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent">FORMALIA</span>
<button class="text-on-surface-variant hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined">help_outline</span>
</button>
</div>
</header>
<main class="flex-grow flex flex-col items-center px-container-margin py-lg max-w-lg mx-auto w-full">
<!-- Stepper Indicator -->
<div class="w-full mb-xl">
<div class="flex justify-between items-end mb-xs">
<span class="font-label-sm text-label-sm text-primary uppercase tracking-wider">Paso 4 de 4</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">Formalización Final</span>
</div>
<div class="h-2 w-full bg-surface-container rounded-full overflow-hidden flex">
<div class="h-full bg-secondary w-full transition-all duration-500 ease-out"></div>
</div>
</div>
<!-- Title & Subtitle -->
<div class="text-center mb-xl">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-sm">¿Ya cuentas con RUC 10?</h1>
<p class="font-body-md text-body-md text-on-surface-variant px-4">Esto nos ayudará a configurar tu Roadmap de formalización de manera personalizada.</p>
</div>
<!-- Illustration -->
<div class="relative w-full aspect-[16/9] mb-xl rounded-xl overflow-hidden bg-surface-container-low flex items-center justify-center">
<img class="w-48 h-auto object-contain" data-alt="A clean, minimalist 3D isometric illustration of a professional government document with a subtle official seal of SUNAT. The color palette is composed of corporate blues and sea greens with soft ambient lighting on a white background, evoking a sense of institutional trust and modern efficiency." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAgyAj1qLbyXNozch6TQN7ZfyzpvtfOGKjhhX3DGPiWW31cOpnSsM7XbVwkx7nMLL6mtZ39pu_pmG123pRjVsh1ncq4NyIwYT0atzWxkuKxFH39pQa3YPVw7qVmQICHI8zqR0nM-i2lYKghjPCOt0zWrZbAoxw0c-wh3YbAWRDZK8gFgnDgpu2IjL6DjMtW5KGFKlZKQblDekiirol2KA0tCamam6BOJWqk5GOaOQQkrJn9lr_S0E4cXqXnfHbAq9LDpqVFE7Rw4jGp"/>
</div>
<!-- Action Cards / Bento-style Layout -->
<div class="w-full space-y-md">
<!-- Option 1: Have RUC -->
<section class="bg-surface-container-lowest p-lg rounded-xl shadow-[0_4px_12px_0_rgba(0,0,0,0.05)] border border-outline-variant/30 transition-all duration-200 active:scale-[0.98]">
<div class="flex items-center gap-md mb-md">
<div class="w-10 h-10 rounded-full bg-primary-fixed flex items-center justify-center text-primary">
<span class="material-symbols-outlined">lock</span>
</div>
<h2 class="font-label-md text-label-md text-on-surface">Sí, tengo mi RUC 10</h2>
</div>
<div class="relative mb-md">
<label class="absolute -top-2 left-3 px-1 bg-surface-container-lowest text-[10px] font-bold text-primary uppercase tracking-tighter" for="ruc-input">Número de RUC</label>
<input class="w-full h-14 border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary px-md font-body-lg tracking-[0.2em]" id="ruc-input" maxlength="11" placeholder="10XXXXXXXXX" type="text"/>
</div>
<button class="w-full h-12 bg-primary text-on-primary font-label-md rounded-lg hover:opacity-90 transition-all active:scale-95 flex items-center justify-center gap-xs">
<span>Validar y Finalizar</span>
<span class="material-symbols-outlined text-[18px]">verified</span>
</button>
</section>
<div class="flex items-center py-sm">
<div class="flex-grow h-[1px] bg-outline-variant"></div>
<span class="px-md font-label-sm text-label-sm text-outline">O</span>
<div class="flex-grow h-[1px] bg-outline-variant"></div>
</div>
<!-- Option 2: No RUC -->
<button class="w-full p-lg bg-surface-container-lowest border-2 border-dashed border-outline-variant rounded-xl flex items-center justify-between hover:border-secondary hover:bg-secondary-container/10 transition-colors group">
<div class="flex items-center gap-md">
<div class="w-10 h-10 rounded-full bg-secondary-container flex items-center justify-center text-on-secondary-container">
<span class="material-symbols-outlined">add_circle</span>
</div>
<div class="text-left">
<span class="block font-label-md text-label-md text-on-surface">Aún no tengo RUC</span>
<span class="block font-label-sm text-label-sm text-on-surface-variant">Quiero tramitarlo con Formalia</span>
</div>
</div>
<span class="material-symbols-outlined text-outline group-hover:text-secondary transition-colors">chevron_right</span>
</button>
</div>

<div class="mt-xl w-full">
<button class="w-full h-14 bg-formalia-gradient text-on-primary font-headline-md rounded-xl shadow-lg pulse-shadow flex items-center justify-center gap-sm transition-transform active:scale-95" onclick="window.location.href='#'">
                Finalizar Registro
                <span class="material-symbols-outlined">rocket_launch</span>
</button>
<p class="mt-md text-center font-label-sm text-label-sm text-on-surface-variant opacity-60">
                Al finalizar, aceptas nuestros Términos y Condiciones de uso.
            </p>
</div>
</main>
<!-- Bottom Margin for Mobile -->
<div class="h-12 lg:hidden"></div>
<!-- Micro-interaction Scripts -->
<script>
        // Form Validation UI micro-interaction
        const rucInput = document.getElementById('ruc-input');
        rucInput.addEventListener('input', (e) => {
            // Remove non-digits
            e.target.value = e.target.value.replace(/\D/g, '');
            
            if (e.target.value.length === 11) {
                rucInput.classList.add('border-secondary');
                rucInput.classList.remove('border-outline-variant');
            } else {
                rucInput.classList.remove('border-secondary');
                rucInput.classList.add('border-outline-variant');
            }
        });

        // Simple button active states already handled by Tailwind 'active:'
    </script>
