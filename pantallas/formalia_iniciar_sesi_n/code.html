<body class="bg-background min-h-screen flex flex-col items-center justify-center p-container-margin overflow-hidden relative">
<!-- Background Subtle Atmospheric Element -->
<div class="absolute inset-0 z-0 opacity-40 pointer-events-none">
<div class="absolute top-[-10%] right-[-5%] w-[400px] h-[400px] bg-secondary-fixed-dim blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-5%] left-[-5%] w-[300px] h-[300px] bg-primary-fixed blur-[100px] rounded-full"></div>
</div>
<!-- Login Container -->
<main class="relative z-10 w-full max-w-[440px] animate-in fade-in slide-in-from-bottom-4 duration-700">
<!-- Logo Section -->
<div class="flex flex-col items-center mb-xl">
<div class="w-16 h-16 mb-md rounded-2xl primary-gradient flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined text-white text-[32px]">account_balance</span>
</div>
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary tracking-tight">FORMALIA</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-base">Gestión empresarial con integridad</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-[24px] shadow-[0_4px_12px_rgba(0,0,0,0.05)] p-xl border border-surface-container-high">
<form action="#" class="space-y-lg" method="POST">
<!-- Email Field -->
<div class="space-y-base">
<label class="font-label-md text-label-md text-on-surface-variant block ml-1" for="email">Email</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
<input class="w-full h-[52px] pl-11 pr-md bg-surface border border-outline-variant rounded-xl font-body-md text-body-md text-on-surface placeholder:text-outline/50 transition-all focus:border-primary focus:ring-1 focus:ring-primary outline-none" id="email" name="email" placeholder="nombre@empresa.com" required="" type="email">
</div>
</div>
<!-- Password Field -->
<div class="space-y-base">
<div class="flex justify-between items-center px-1">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Contraseña</label>
<a class="font-label-sm text-label-sm text-primary hover:underline transition-all" href="#">Olvidé mi contraseña</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="w-full h-[52px] pl-11 pr-md bg-surface border border-outline-variant rounded-xl font-body-md text-body-md text-on-surface placeholder:text-outline/50 transition-all focus:border-primary focus:ring-1 focus:ring-primary outline-none" id="password" name="password" placeholder="••••••••" required="" type="password">
<button class="absolute inset-y-0 right-0 pr-md flex items-center text-outline hover:text-on-surface-variant" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined text-[20px]" id="visibility_icon">visibility</span>
</button>
</div>
</div>
<!-- Remember Me (Optional but professional) -->
<div class="flex items-center px-1">
<input class="h-4 w-4 rounded border-outline-variant text-primary focus:ring-primary" id="remember-me" name="remember-me" type="checkbox">
<label class="ml-sm block font-label-sm text-label-sm text-on-surface-variant" for="remember-me">Mantener sesión iniciada</label>
</div>
<!-- Submit Button -->
<button class="w-full h-[56px] primary-gradient text-white font-headline-md text-headline-md rounded-xl transition-all active:scale-[0.98] shadow-md flex items-center justify-center gap-sm" type="submit">
                    Ingresar

</button>

<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const icon = document.getElementById('visibility_icon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.innerText = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                icon.innerText = 'visibility';
            }
        }

        // Simple Fade-in micro-interaction
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = document.querySelectorAll('input');
            inputs.forEach(input => {
                input.addEventListener('focus', () => {
                    input.parentElement.classList.add('scale-[1.01]');
                });
                input.addEventListener('blur', () => {
                    input.parentElement.classList.remove('scale-[1.01]');
                });
            });
        });
    </script>
